<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Raymond — Live Market Scan</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #07080b;
    --panel: #11141a;
    --panel2: #181c24;
    --border: #232833;
    --text: #e5e8ef;
    --muted: #6f7787;
    --dim: #4a5060;
    --accent: #ffd23f;
    --accent2: #ffa726;
    --green: #4ade80;
    --green-dim: #1d3a25;
    --red: #f87171;
    --red-dim: #3a1d1d;
    --blue: #60a5fa;
    --purple: #c084fc;
    --hit: #ff3366;
    --hit-glow: rgba(255, 51, 102, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    padding: 10px 18px 8px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0b0d12, var(--bg));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .brand h1 {
    font: 600 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.5px;
  }
  .brand .sub { color: var(--muted); font-size: 11px; }
  /* ── Market Pulse banner (weather + flanking tags) ── */
  #pulse-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex: 1 1 auto;
    min-width: 0;
    padding: 0 12px;
  }
  #pulse-bar .pulse-tags {
    display: flex; gap: 6px; flex-wrap: wrap;
    justify-content: flex-end;
    flex: 1 1 0; min-width: 0;
  }
  #pulse-bar .pulse-tags.right { justify-content: flex-start; }
  #pulse-bar .pulse-tag {
    font: 600 10px/1.4 ui-monospace, monospace;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  #pulse-center {
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 14px;
    border-radius: 12px;
    background: var(--panel2);
    border: 1px solid var(--border);
    min-width: 170px;
  }
  #pulse-center .pulse-label {
    font: 700 13px/1.1 -apple-system, sans-serif;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  #pulse-center .pulse-score {
    font: 500 10px/1.2 ui-monospace, monospace;
    color: var(--muted); margin-top: 2px;
  }
  /* weather palette */
  #pulse-center.clear    { color:#4ade80; border-color: rgba(74,222,128,.45); background: rgba(74,222,128,.08); }
  #pulse-center.fair     { color:#a3e635; border-color: rgba(163,230,53,.40); background: rgba(163,230,53,.06); }
  #pulse-center.overcast { color:#94a3b8; border-color: rgba(148,163,184,.35); background: rgba(148,163,184,.06); }
  #pulse-center.stormy   { color:#fbbf24; border-color: rgba(251,191,36,.45); background: rgba(251,191,36,.08); }
  #pulse-center.severe   { color:#f87171; border-color: rgba(248,113,113,.55); background: rgba(248,113,113,.10); }
  .clock { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }

  /* ── Banner (hit) ───────────────────────────────── */
  #banner {
    position: fixed;
    top: 60px; left: 50%; transform: translateX(-50%) translateY(-200%);
    z-index: 50;
    width: min(820px, 92vw);
    padding: 16px 28px;
    background: linear-gradient(135deg, #ff3366, #ff7a1a);
    color: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 40px var(--hit-glow), 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.45s cubic-bezier(.22,1.5,.4,1), opacity 0.4s;
    display: flex; align-items: center; gap: 18px;
    font: 600 16px/1.3 -apple-system, sans-serif;
  }
  #banner.show { transform: translateX(-50%) translateY(0); }
  #banner .icon { font-size: 28px; }
  #banner .ticker {
    background: rgba(0,0,0,0.25);
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  #banner .pts { font-weight: 800; }
  #banner .reason { opacity: 0.92; font-weight: 500; font-size: 14px; }
  #banner .scan { opacity: 0.6; font-size: 12px; margin-left: auto; }

  /* ── Main 2-col layout ──────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: 0;
    overflow: hidden;
  }

  /* Terminal column */
  #terminal-wrap {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .col-head {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font: 600 11px/1 -apple-system, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    display: flex; align-items: center; gap: 10px;
  }
  .col-head .count { color: var(--dim); font-weight: 400; }
  .col-head .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    font-size: 12.5px;
  }
  #terminal::-webkit-scrollbar { width: 8px; }
  #terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .ev {
    padding: 2px 16px;
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 10px;
    align-items: baseline;
    border-left: 3px solid transparent;
  }
  .ev:hover { background: rgba(255,255,255,0.03); }
  .ev .ts  { color: var(--dim); font-size: 11px; font-variant-numeric: tabular-nums; }
  .ev .msg { color: var(--text); white-space: pre; overflow: hidden; text-overflow: ellipsis; }
  /* per-scan color (border + message tint). Applied via data-scan attribute. */
  .ev[data-scan="market_pulse"]      { border-left-color:#facc15; } .ev[data-scan="market_pulse"]      .msg { color:#facc15; }
  .ev[data-scan="tech_slice"]        { border-left-color:#7dd3fc; } .ev[data-scan="tech_slice"]        .msg { color:#cfe9ff; }
  .ev[data-scan="insider_cluster"]   { border-left-color:#a78bfa; } .ev[data-scan="insider_cluster"]   .msg { color:#d8caff; }
  .ev[data-scan="material_8k"]       { border-left-color:#34d399; } .ev[data-scan="material_8k"]       .msg { color:#bff0d8; }
  .ev[data-scan="sc_13dg"]           { border-left-color:#22d3ee; } .ev[data-scan="sc_13dg"]           .msg { color:#b3eef7; }
  .ev[data-scan="halt_tape"]         { border-left-color:#f87171; } .ev[data-scan="halt_tape"]         .msg { color:#ffc4c4; }
  .ev[data-scan="rvol_stream"]       { border-left-color:#4ade80; } .ev[data-scan="rvol_stream"]       .msg { color:#bff5d0; }
  .ev[data-scan="options_unusual"]   { border-left-color:#fb923c; } .ev[data-scan="options_unusual"]   .msg { color:#ffd2b0; }
  .ev[data-scan="reg_sho"]           { border-left-color:#fb7185; } .ev[data-scan="reg_sho"]           .msg { color:#ffc7d1; }
  .ev[data-scan="fundamentals_snap"] { border-left-color:#94a3b8; } .ev[data-scan="fundamentals_snap"] .msg { color:#cbd5e1; }
  .ev[data-scan="xbrl_facts"]        { border-left-color:#e879f9; } .ev[data-scan="xbrl_facts"]        .msg { color:#f4c8fc; }
  /* notable/hit override the per-scan tint */
  .ev.notable {
    background: rgba(255, 210, 63, 0.06);
  }
  .ev.notable .msg { color: var(--accent) !important; }
  .ev.hit {
    background: linear-gradient(90deg, rgba(255,51,102,0.10), transparent 60%);
  }
  .ev.hit .msg { color: #ffb3c5 !important; font-weight: 600; }

  /* Watchlist column */
  #watch-wrap {
    display: flex; flex-direction: column;
    min-height: 0;
    background: var(--panel);
  }
  #watch {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #watch::-webkit-scrollbar { width: 8px; }
  #watch::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .row {
    padding: 9px 14px 8px;
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    grid-template-rows: auto auto;
    grid-template-areas:
      "rank tk score spark"
      "rank tags tags tags";
    column-gap: 10px;
    row-gap: 5px;
    align-items: center;
    border-bottom: 1px solid #1a1d23;
    transition: background 0.3s;
  }
  .row.flash { background: rgba(74,222,128,0.12); }
  .row .rank {
    font: 700 11px/1 -apple-system, sans-serif;
    color: var(--dim);
    text-align: right;
    grid-area: rank;
    align-self: start;
    padding-top: 2px;
  }
  .row.top1 .rank { color: var(--accent); font-size: 13px; }
  .row.top3 .rank { color: var(--accent2); }
  .row .tk {
    font: 700 14px/1 ui-monospace, monospace;
    color: var(--text);
    grid-area: tk;
  }
  .row.top1 .tk { color: var(--accent); text-shadow: 0 0 6px rgba(255,210,63,0.5); }
  .row .score {
    font: 700 13px/1 ui-monospace, monospace;
    color: var(--green);
    text-align: right;
    font-variant-numeric: tabular-nums;
    grid-area: score;
  }
  .row .spark { display: block; width: 60px; height: 16px; opacity: 0.85; grid-area: spark; }
  .row .chip {
    font: 700 9px/1 ui-monospace, monospace;
    letter-spacing: 0.5px;
    padding: 3px 5px;
    border-radius: 3px;
    text-align: center;
    text-transform: uppercase;
    background: #1a1d23;
    color: var(--muted);
    border: 1px solid transparent;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip.tech       { color:#7dd3fc; border-color:rgba(125,211,252,.35); background:rgba(125,211,252,.08); }
  .chip.macro      { color:#facc15; border-color:rgba(250,204,21,.35); background:rgba(250,204,21,.08); }
  .chip.insider    { color:#a78bfa; border-color:rgba(167,139,250,.35); background:rgba(167,139,250,.08); }
  .chip.options    { color:#fb923c; border-color:rgba(251,146,60,.35); background:rgba(251,146,60,.08); }
  .chip.reg_sho    { color:#fb7185; border-color:rgba(251,113,133,.35); background:rgba(251,113,133,.08); }
  .chip.material   { color:#34d399; border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.08); }
  .chip.sc_13dg    { color:#22d3ee; border-color:rgba(34,211,238,.35); background:rgba(34,211,238,.08); }
  .chip.halt       { color:#f87171; border-color:rgba(248,113,113,.35); background:rgba(248,113,113,.08); }
  .chip.fundamentals { color:#94a3b8; border-color:rgba(148,163,184,.35); background:rgba(148,163,184,.08); }
  .chip.rvol       { color:#4ade80; border-color:rgba(74,222,128,.35); background:rgba(74,222,128,.08); }
  .row .reason {
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Per-ticker attribute tag marquee (row 2 of the watchlist row).
     If the tag track is wider than its container it slides continuously;
     when it fits, the animation is disabled so short rows sit still. */
  .row .tags {
    grid-area: tags;
    overflow: hidden;
    position: relative;
    height: 18px;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
  }
  .row .tags-track {
    display: inline-flex;
    gap: 5px;
    white-space: nowrap;
    will-change: transform;
    padding-right: 24px;
  }
  .row .tags.scrolling .tags-track {
    animation: tag-marquee linear infinite;
  }
  .row:hover .tags.scrolling .tags-track { animation-play-state: paused; }
  @keyframes tag-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .row .tag {
    font: 600 9px/1 ui-monospace, monospace;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 3px 6px;
    border-radius: 3px;
    background: #1a1d23;
    color: var(--muted);
    border: 1px solid transparent;
    flex: 0 0 auto;
  }
  .row .tag.tech         { color:#7dd3fc; border-color:rgba(125,211,252,.35); background:rgba(125,211,252,.08); }
  .row .tag.macro        { color:#facc15; border-color:rgba(250,204,21,.35); background:rgba(250,204,21,.08); }
  .row .tag.insider      { color:#a78bfa; border-color:rgba(167,139,250,.35); background:rgba(167,139,250,.08); }
  .row .tag.options      { color:#fb923c; border-color:rgba(251,146,60,.35); background:rgba(251,146,60,.08); }
  .row .tag.reg_sho      { color:#fb7185; border-color:rgba(251,113,133,.35); background:rgba(251,113,133,.08); }
  .row .tag.material     { color:#34d399; border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.08); }
  .row .tag.sc_13dg      { color:#22d3ee; border-color:rgba(34,211,238,.35); background:rgba(34,211,238,.08); }
  .row .tag.halt         { color:#f87171; border-color:rgba(248,113,113,.35); background:rgba(248,113,113,.08); }
  .row .tag.fundamentals { color:#94a3b8; border-color:rgba(148,163,184,.35); background:rgba(148,163,184,.08); }
  .row .tag.xbrl_facts   { color:#c4b5fd; border-color:rgba(196,181,253,.35); background:rgba(196,181,253,.08); }
  .row .tag.rvol         { color:#4ade80; border-color:rgba(74,222,128,.35); background:rgba(74,222,128,.08); }

  /* Pulse-change inline banner (separate from 🎯 hit banner) */
  #regime-banner {
    position: fixed;
    top: 56px;
    left: 50%;
    transform: translateX(-50%) translateY(-30px);
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 18px;
    border-radius: 6px;
    font: 700 13px/1.2 ui-monospace, monospace;
    letter-spacing: 0.4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 50;
  }
  #regime-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #regime-banner.clear, #regime-banner.fair       { color: var(--green); border-color: var(--green); }
  #regime-banner.stormy, #regime-banner.severe    { color: var(--red);   border-color: var(--red); }
  #regime-banner.overcast                         { color: var(--muted); border-color: var(--border); }

  /* ── Footer ─────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 7px 18px;
    display: flex;
    gap: 22px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
  }
  footer .item strong { color: var(--text); font-weight: 600; }
  footer .ok { color: var(--green); }
  footer .err { color: var(--red); }
  footer a { color: var(--blue); text-decoration: none; margin-left: auto; }
  footer a:hover { text-decoration: underline; }

  /* ── Scan strip (per-scan health rail) ──────────── */
  #scan-strip {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    grid-auto-rows: minmax(0, 1fr);
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  @media (max-width: 900px) {
    #scan-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  .scan-tile {
    position: relative;
    padding: 8px 12px 9px;
    border-radius: 6px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--dim);
    display: grid;
    grid-template-rows: auto auto auto;
    gap: 3px;
    min-width: 0;
    overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
  }
  .scan-tile .name {
    font: 600 12px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.2px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scan-tile .cron {
    font-size: 10.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scan-tile .meta {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    font-size: 10.5px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
  }
  .scan-tile .meta .age { color: var(--muted); overflow: hidden; text-overflow: ellipsis; }
  .scan-tile.ok      { border-left-color: var(--green); }
  .scan-tile.stale   { border-left-color: var(--accent2); }
  .scan-tile.err     { border-left-color: var(--red); background: var(--red-dim); }
  .scan-tile.pending { border-left-color: var(--dim); opacity: 0.7; }
  /* per-scan accent ribbon (overrides health border when tile is ok) */
  .scan-tile.ok.scan-market_pulse      { border-left-color:#facc15; }
  .scan-tile.ok.scan-tech_slice        { border-left-color:#7dd3fc; }
  .scan-tile.ok.scan-insider_cluster   { border-left-color:#a78bfa; }
  .scan-tile.ok.scan-material_8k       { border-left-color:#34d399; }
  .scan-tile.ok.scan-sc_13dg           { border-left-color:#22d3ee; }
  .scan-tile.ok.scan-halt_tape         { border-left-color:#f87171; }
  .scan-tile.ok.scan-rvol_stream       { border-left-color:#4ade80; }
  .scan-tile.ok.scan-options_unusual   { border-left-color:#fb923c; }
  .scan-tile.ok.scan-reg_sho           { border-left-color:#fb7185; }
  .scan-tile.ok.scan-fundamentals_snap { border-left-color:#94a3b8; }
  .scan-tile.ok.scan-xbrl_facts        { border-left-color:#e879f9; }
  .scan-tile.recent::after {
    content: "";
    position: absolute;
    top: 4px; right: 4px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 4px var(--green);
    animation: pulse 1.6s infinite;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <h1>RAYMOND</h1>
      <div class="sub">live market scan · 24/7</div>
    </div>
  </div>
  <div id="pulse-bar">
    <div class="pulse-tags left"  id="pulse-tags-left"></div>
    <div id="pulse-center" class="overcast">
      <div class="pulse-label" id="pulse-label">PULSE · loading</div>
      <div class="pulse-score" id="pulse-score">— / 100  ·  ×1.00</div>
    </div>
    <div class="pulse-tags right" id="pulse-tags-right"></div>
  </div>
  <div class="clock" id="clock">—</div>
</header>

<section id="scan-strip" title="Scans wired into the live feed. Coloured bar = health."></section>

<div id="banner">
  <div class="icon">🎯</div>
  <div class="ticker" id="b-tk">—</div>
  <div class="pts" id="b-pts">+0</div>
  <div class="reason" id="b-reason">—</div>
  <div class="scan" id="b-scan">—</div>
</div>

<div id="regime-banner"></div>

<main>
  <section id="terminal-wrap">
    <div class="col-head">
      <span class="live-dot"></span>
      SCAN FEED
      <span class="count" id="ev-count">0 events</span>
    </div>
    <div id="terminal"></div>
  </section>
  <section id="watch-wrap">
    <div class="col-head">
      🏆 TOP 10 WATCHLIST
      <span class="count" id="wl-meta">scores decay with a 12-hour half-life</span>
    </div>
    <div id="watch"></div>
  </section>
</main>

<footer>
  <div class="item"><strong id="f-scans">0</strong> scans</div>
  <div class="item"><strong id="f-hits">0</strong> hits</div>
  <div class="item">macro: <strong id="f-macro">—</strong></div>
  <div class="item">last scan: <strong id="f-last">—</strong></div>
  <div class="item">status: <span id="f-status" class="ok">live</span></div>
  <a href="https://github.com/smanderson721/raymond" target="_blank">repo</a>
  <a href="docs/data-sources.html">data sources</a>
</footer>

<script>
const POLL_INTERVAL = 6000;
// Feed pacing: aim to drain the visible queue across roughly this many
// milliseconds. When a scan dumps 60 events at once, we spread them out
// instead of bursting. Clamped between MIN_GAP and MAX_GAP so we never
// stall the feed completely (small queue) or lag behind (huge queue).
const FEED_DRAIN_TARGET_MS = 15000;
const FEED_MIN_GAP_MS = 120;
const FEED_MAX_GAP_MS = 2500;
const MAX_VISIBLE_EVENTS = 250;

const URLS = {
  events:    "data/live/events.json",
  watchlist: "data/live/watchlist.json",
  hits:      "data/live/hits.json",
  status:    "data/live/status.json",
  macro:     "data/live/market_pulse.json",
  streams:   "data/live/_stream_status.json",
};

let seenEventKeys = new Set();
let seenHitKeys = new Set();
let queue = [];
let prevWatchTs = new Map();
let firstLoad = true;

// ── Scan registry ───────────────────────────────────────────────────
// Cron schedules mirror .github/workflows/live-scans.yml. Update both.
// "stale_min" = minutes after which a scan is considered overdue.
const SCAN_REGISTRY = [
  { id: "market_pulse",      title: "Market Pulse",       cron: "0 12 * * *",         label: "daily 12:00 UTC",       stale_min: 1500 },
  { id: "tech_slice",        title: "Technical",          cron: "7-59/15 * * * *",    label: "every 15 min (+7)",     stale_min: 30   },
  { id: "insider_cluster",   title: "Insider Buying",     cron: "20 */3 * * *",       label: "every 3 hr",            stale_min: 240  },
  { id: "material_8k",       title: "8-K Material",       cron: "5 */2 * * *",        label: "every 2 hr",            stale_min: 180  },
  { id: "sc_13dg",           title: "Activist Stakes",    cron: "35 * * * *",         label: "hourly",                stale_min: 120  },
  { id: "halt_tape",         title: "Halts & Resumes",    cron: "*/2 14-20 * * 1-5",  label: "every 2 min, mkt hrs",  stale_min: 15   },
  { id: "rvol_stream",       title: "Live RVOL",          cron: "",                   label: "Alpaca IEX stream",     kind: "daemon" },
  { id: "options_unusual",   title: "Unusual Options",    cron: "*/30 14-20 * * 1-5", label: "every 30 min, mkt hrs", stale_min: 120  },
  { id: "reg_sho",           title: "Short Squeeze List", cron: "30 12 * * *",        label: "daily 12:30 UTC",       stale_min: 1500 },
  { id: "fundamentals_snap", title: "Fundamentals",       cron: "12-59/15 * * * *", label: "every 15 min (slice)", stale_min: 30   },
  { id: "xbrl_facts",        title: "Earnings (XBRL)",    cron: "0 14 * * *",         label: "daily 14:00 UTC",       stale_min: 1500 },
];

function renderScanStrip(runs, streams) {
  const strip = document.getElementById("scan-strip");
  // pick the most-recent run per scan
  const latest = new Map();
  for (const r of runs || []) {
    const prev = latest.get(r.scan);
    if (!prev || r.started_at > prev.started_at) latest.set(r.scan, r);
  }
  const now = Date.now();
  strip.innerHTML = SCAN_REGISTRY.map(meta => {
    const niceName = meta.title || meta.id;
    const scanCls  = `scan-${meta.id}`;
    // ── daemon (long-running stream) tile ──
    if (meta.kind === "daemon") {
      const st = streams && streams[meta.id];
      let cls = "pending", line = "not started", right = "—";
      if (st) {
        if (st.error) { cls = "err"; line = st.error; }
        else if (st.connected) {
          cls = "ok recent";
          line = `streaming · ${st.subscribed_count ?? 0} subs`;
          if (st.last_bar_at) {
            const ageMin = (now - Date.parse(st.last_bar_at)) / 60000;
            right = ageMin < 1 ? "now"
                  : ageMin < 60 ? `${Math.round(ageMin)}m ago`
                  : `${(ageMin/60).toFixed(1)}h ago`;
          } else {
            right = "awaiting bars";
          }
        } else {
          cls = "stale";
          line = "disconnected";
        }
      }
      const title = `${meta.id}\n` + (st ? JSON.stringify(st, null, 2) : "daemon has not reported yet");
      return `
        <div class="scan-tile ${cls} ${scanCls}" title="${title.replace(/"/g,'&quot;')}">
          <div class="name">${niceName}</div>
          <div class="cron">${meta.label}</div>
          <div class="meta"><span class="age">${line}</span><span>${right}</span></div>
        </div>
      `;
    }
    // ── periodic scan tile ──
    const last = latest.get(meta.id);
    let cls = "pending", age = "never", metaRight = "—";
    if (last) {
      const ts = Date.parse(last.started_at);
      const ageMin = (now - ts) / 60000;
      if (last.error) cls = "err";
      else if (ageMin > meta.stale_min) cls = "stale";
      else cls = "ok";
      age = ageMin < 1 ? "now"
          : ageMin < 60 ? `${Math.round(ageMin)}m ago`
          : ageMin < 1440 ? `${(ageMin/60).toFixed(1)}h ago`
          : `${Math.round(ageMin/1440)}d ago`;
      metaRight = `${last.events ?? 0}ev · ${last.awards ?? 0}aw`;
      if ((now - ts) < 90000) cls += " recent";
    }
    const baseTitle = `${meta.id} · ${meta.cron || meta.label}`;
    const legend = "\nev = log lines emitted this run · aw = tickers that scored points (awards)";
    const title = last && last.error
      ? `${baseTitle}\nerror: ${last.error}${legend}`
      : (last && last.note) ? `${baseTitle}\n${last.note}${legend}` : `${baseTitle}\nno run yet${legend}`;
    return `
      <div class="scan-tile ${cls} ${scanCls}" title="${title.replace(/"/g,'&quot;')}">
        <div class="name">${niceName}</div>
        <div class="cron">${meta.label}</div>
        <div class="meta"><span class="age">${age}</span><span>${metaRight}</span></div>
      </div>
    `;
  }).join("");
}

async function jget(url) {
  try {
    const r = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

const fmtTs = iso => iso ? iso.slice(11, 19) : "—";
const lvlClass = lvl => lvl === "hit" ? "hit" : lvl === "notable" ? "notable" : "info";

function renderEvent(ev) {
  const term = document.getElementById("terminal");
  const div = document.createElement("div");
  div.className = "ev " + lvlClass(ev.level);
  if (ev.scan) div.setAttribute("data-scan", ev.scan);
  div.title = ev.scan || "";   // hover to identify
  div.innerHTML = `
    <span class="ts">${fmtTs(ev.ts)}</span>
    <span class="msg">${(ev.message || "").replace(/</g, "&lt;")}</span>
  `;
  term.appendChild(div);
  while (term.children.length > MAX_VISIBLE_EVENTS) term.removeChild(term.firstChild);
  term.scrollTop = term.scrollHeight;
}

function showBanner(hit) {
  const b = document.getElementById("banner");
  document.getElementById("b-tk").textContent = hit.ticker;
  document.getElementById("b-pts").textContent = "+" + Number(hit.points).toFixed(1);
  document.getElementById("b-reason").textContent = hit.reason || "";
  document.getElementById("b-scan").textContent = hit.scan || "";
  b.classList.remove("show");
  void b.offsetWidth;
  b.classList.add("show");
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => b.classList.remove("show"), 8000);
  playHitChime();
}

// ── audio: short triangle chime when a 🎯 hit banner fires ──
let _audioCtx = null;
function _getAudioCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { return null; }
  return _audioCtx;
}
// browsers require a user gesture before allowing audio playback
document.addEventListener("click", () => { const c=_getAudioCtx(); if (c && c.state==="suspended") c.resume(); }, { once: true });
function playHitChime() {
  const ctx = _getAudioCtx();
  if (!ctx || ctx.state !== "running") return;
  const t = ctx.currentTime;
  // two-tone ping: 900Hz → 1400Hz over 220ms
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(900, t);
  osc.frequency.exponentialRampToValueAtTime(1400, t + 0.12);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  osc.connect(gain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.25);
}

// ── pulse-change inline banner ──
let _prevPulseLabel = null;
function showPulseBanner(prev, next, mult, labelKey) {
  const b = document.getElementById("regime-banner");
  if (!b) return;
  const arrow = prev ? `${prev.toUpperCase()} → ${next.toUpperCase()}` : next.toUpperCase();
  b.textContent = `MARKET PULSE · ${arrow} · ×${mult}`;
  b.className = ""; b.classList.add(labelKey);
  void b.offsetWidth;
  b.classList.add("show");
  clearTimeout(showPulseBanner._t);
  showPulseBanner._t = setTimeout(() => b.classList.remove("show"), 6000);
}

// ── sparkline state ──
const SPARK_MAX = 24;        // ~2 min at 5s poll
const sparkData = new Map(); // ticker → [score, ...]
function _scanChipClass(scan) {
  if (!scan) return "";
  if (scan.startsWith("tech"))        return "tech";
  if (scan.startsWith("market_pulse")) return "macro";
  if (scan.startsWith("macro"))       return "macro";
  if (scan.startsWith("insider"))     return "insider";
  if (scan.startsWith("options"))     return "options";
  if (scan.startsWith("reg_sho"))     return "reg_sho";
  if (scan.startsWith("material"))    return "material";
  if (scan.startsWith("sc_13"))       return "sc_13dg";
  if (scan.startsWith("halt"))        return "halt";
  if (scan.startsWith("fundamentals")) return "fundamentals";
  if (scan.startsWith("rvol"))        return "rvol";
  return "";
}
function _sparkSVG(values) {
  if (!values || values.length < 2) {
    return '<svg class="spark" viewBox="0 0 60 16" preserveAspectRatio="none"></svg>';
  }
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const stepX = 60 / (values.length - 1);
  const pts = values.map((v, i) => `${(i*stepX).toFixed(1)},${(14 - (v-min)/range*12).toFixed(1)}`).join(" ");
  const trend = values[values.length-1] - values[0];
  const stroke = trend >= 0 ? "#4ade80" : "#ff3366";
  return `<svg class="spark" viewBox="0 0 60 16" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.4"/></svg>`;
}

function renderWatchlist(wl) {
  const w = document.getElementById("watch");
  const newTs = new Map(wl.map(r => [r.ticker, r.last_ts]));
  // update sparkline series
  const liveTickers = new Set(wl.map(r => r.ticker));
  for (const r of wl) {
    const arr = sparkData.get(r.ticker) || [];
    const last = arr.length ? arr[arr.length-1] : null;
    if (last === null || Math.abs(last - r.score) > 0.001) arr.push(r.score);
    while (arr.length > SPARK_MAX) arr.shift();
    sparkData.set(r.ticker, arr);
  }
  // garbage-collect tickers that fell off the watchlist
  for (const tk of [...sparkData.keys()]) if (!liveTickers.has(tk)) sparkData.delete(tk);

  w.innerHTML = wl.slice(0, 10).map(r => {
    const flashing = !firstLoad && prevWatchTs.has(r.ticker) && prevWatchTs.get(r.ticker) !== r.last_ts;
    const topClass = r.rank === 1 ? "top1" : r.rank <= 3 ? "top3" : "";
    const spark = _sparkSVG(sparkData.get(r.ticker));
    // Build the attribute-tag marquee. Tags are produced by
    // ``research/live_score_engine.py`` (rolling, decay-pruned). Fall back
    // to a single chip derived from last_scan/last_reason for the rare
    // ticker that scored before the engine started tracking attrs[].
    const attrs = Array.isArray(r.attrs) ? r.attrs : [];
    let tagItems;
    if (attrs.length) {
      tagItems = attrs.map(a => {
        const cls = _scanChipClass(a.scan || "");
        const label = (a.label || a.key || "").replace(/_/g, " ");
        const title = `${a.scan || ""} · ${a.key || ""} · +${Number(a.points||0).toFixed(1)} pts`;
        return `<span class="tag ${cls}" title="${title.replace(/"/g,'&quot;')}">${label}</span>`;
      });
    } else {
      const cls = _scanChipClass(r.last_scan || "");
      const lbl = (r.last_scan || "—").replace(/_/g, " ");
      const reason = (r.last_reason || "").replace(/</g, "&lt;").replace(/"/g,'&quot;');
      tagItems = [`<span class="tag ${cls}" title="${reason}">${lbl}</span>`];
    }
    const tagsHTML = tagItems.join("");
    // Duplicate the track once so the keyframe ``translateX(-50%)`` loop
    // is seamless; ``.scrolling`` is added in a post-render pass below
    // only when the track overflows its container.
    return `
      <div class="row ${topClass} ${flashing ? "flash" : ""}" data-ticker="${r.ticker}">
        <span class="rank">${r.rank}</span>
        <span class="tk">${r.ticker}</span>
        <span class="score">${Number(r.score).toFixed(1)}</span>
        ${spark}
        <div class="tags"><div class="tags-track">${tagsHTML}${tagsHTML}</div></div>
      </div>
    `;
  }).join("");
  // Decide which rows need the marquee animation. We measure the
  // duplicated track: half its width is the "real" content width; if
  // that exceeds the container, enable the scroll and set a duration
  // proportional to length (≈ 30 px/sec).
  requestAnimationFrame(() => {
    w.querySelectorAll(".row .tags").forEach(box => {
      const track = box.querySelector(".tags-track");
      if (!track) return;
      const realW = track.scrollWidth / 2;
      if (realW > box.clientWidth + 4) {
        const dur = Math.max(8, Math.round(realW / 30));
        track.style.animationDuration = `${dur}s`;
        box.classList.add("scrolling");
      } else {
        box.classList.remove("scrolling");
        track.style.animationDuration = "";
      }
    });
  });
  prevWatchTs = newTs;
  if (firstLoad) firstLoad = false;
  else setTimeout(() => {
    document.querySelectorAll(".row.flash").forEach(r => r.classList.remove("flash"));
  }, 1500);
}

function pumpQueue() {
  if (queue.length === 0) return;
  renderEvent(queue.shift());
  document.getElementById("ev-count").textContent =
    `${document.getElementById("terminal").children.length} events visible`;
  // dynamic pacing: spread queued events evenly across FEED_DRAIN_TARGET_MS,
  // clamped to [FEED_MIN_GAP_MS, FEED_MAX_GAP_MS]. Long quiet periods feel
  // calmer (~2s/event when 1-2 queued); big bursts still drain quickly.
  const ideal = queue.length > 0 ? FEED_DRAIN_TARGET_MS / queue.length : FEED_MAX_GAP_MS;
  const rate = Math.min(FEED_MAX_GAP_MS, Math.max(FEED_MIN_GAP_MS, ideal));
  setTimeout(pumpQueue, rate);
}

async function poll() {
  const [events, watchlist, hits, status, macro, streams] = await Promise.all([
    jget(URLS.events), jget(URLS.watchlist), jget(URLS.hits),
    jget(URLS.status), jget(URLS.macro), jget(URLS.streams),
  ]);

  if (events && Array.isArray(events.events)) {
    const fresh = events.events.filter(e => {
      const k = e.ts + "|" + (e.message || "");
      if (seenEventKeys.has(k)) return false;
      seenEventKeys.add(k);
      return true;
    });
    if (fresh.length > 0) {
      if (firstLoad) {
        // initial page load: render the full backlog instantly and snap to
        // the bottom, so a refresh lands the viewer on the latest event
        // instead of forcing them to wait while events scroll in from the top.
        const term = document.getElementById("terminal");
        for (const ev of fresh) renderEvent(ev);
        document.getElementById("ev-count").textContent =
          `${term.children.length} events visible`;
        term.scrollTop = term.scrollHeight;
      } else {
        const wasIdle = queue.length === 0;
        queue.push(...fresh);
        if (wasIdle) pumpQueue();
      }
    }
    // bound the seen set
    if (seenEventKeys.size > 5000) seenEventKeys = new Set(Array.from(seenEventKeys).slice(-2500));
  }

  if (watchlist && Array.isArray(watchlist.watchlist)) {
    renderWatchlist(watchlist.watchlist);
  }

  if (hits && Array.isArray(hits.hits)) {
    const fresh = hits.hits.filter(h => {
      const k = h.ts + "|" + h.ticker;
      if (seenHitKeys.has(k)) return false;
      seenHitKeys.add(k);
      return true;
    });
    if (fresh.length > 0 && !document.hidden) {
      showBanner(fresh[fresh.length - 1]);
    }
    document.getElementById("f-hits").textContent = hits.hits.length;
  }

  if (macro && macro.label_key) {
    const center = document.getElementById("pulse-center");
    const lbl    = document.getElementById("pulse-label");
    const sc     = document.getElementById("pulse-score");
    const lt     = document.getElementById("pulse-tags-left");
    const rt     = document.getElementById("pulse-tags-right");
    center.className = macro.label_key;
    lbl.textContent  = macro.label || macro.label_key;
    sc.textContent   = `${(macro.health_score ?? 0).toFixed(0)} / 100  ·  ×${macro.multiplier}`;
    const tagHtml = t => `<span class="pulse-tag">${t}</span>`;
    lt.innerHTML = (macro.left_tags  || []).map(tagHtml).join("");
    rt.innerHTML = (macro.right_tags || []).map(tagHtml).join("");
    document.getElementById("f-macro").textContent =
      `${macro.label || macro.label_key} · ${(macro.health_score ?? 0).toFixed(0)}/100 (VIX ${macro.vix_level ?? "—"})`;
    if (_prevPulseLabel !== null && _prevPulseLabel !== macro.label_key) {
      showPulseBanner(_prevPulseLabel, macro.label_key, macro.multiplier, macro.label_key);
      playHitChime();
    }
    _prevPulseLabel = macro.label_key;
  }

  if (status && Array.isArray(status.runs)) {
    const runs = status.runs;
    renderScanStrip(runs, streams || {});
    document.getElementById("f-scans").textContent = runs.length;
    const last = runs[runs.length - 1];
    if (last) {
      document.getElementById("f-last").textContent =
        `${last.scan} (${fmtTs(last.started_at)} · ${last.duration_sec}s · ${last.events}ev/${last.awards}aw)`;
    }
    const errs = runs.filter(r => r.error).length;
    const f = document.getElementById("f-status");
    if (errs > 0) { f.textContent = `${errs} recent errors`; f.className = "err"; }
    else { f.textContent = "live"; f.className = "ok"; }
  }
}

function tick() {
  const d = new Date();
  document.getElementById("clock").textContent =
    String(d.getUTCHours()).padStart(2,"0") + ":" +
    String(d.getUTCMinutes()).padStart(2,"0") + ":" +
    String(d.getUTCSeconds()).padStart(2,"0") + " UTC";
}
setInterval(tick, 1000);
tick();

renderScanStrip([], {});  // show pending tiles before first poll
poll();

// ── Live updates via SSE (live_daemon) with poll fallback ────────────
//
// When the dashboard is served by raymond/live_daemon.py on alice, the
// daemon exposes /api/stream as an EventSource. Each `scan` or `data`
// event triggers an immediate poll() so the UI updates the moment a
// scan completes — no more 6s polling latency.
//
// If SSE isn't available (e.g. served from GitHub Pages still), we
// fall back to the original 6s polling cadence.

let sseConnected = false;
let pollTimer = setInterval(poll, POLL_INTERVAL);
let pollSoonTimer = null;

function pollSoon() {
  // debounce: many `data` events may arrive in quick succession when
  // a scan finishes and rewrites multiple JSON files.
  if (pollSoonTimer) return;
  pollSoonTimer = setTimeout(() => {
    pollSoonTimer = null;
    poll();
  }, 150);
}

function setLiveStatus(mode) {
  const f = document.getElementById("f-status");
  if (mode === "sse") { f.textContent = "live ⚡"; f.className = "ok"; }
  else if (mode === "poll") { f.textContent = "polling"; f.className = "ok"; }
  else if (mode === "lost") { f.textContent = "reconnecting…"; f.className = "stale"; }
}

function connectSSE() {
  // EventSource auto-reconnects, but we wrap it so we can switch the
  // background poll cadence between "fast safety net" (no SSE) and
  // "slow heartbeat" (SSE alive).
  let es;
  try { es = new EventSource("/api/stream"); }
  catch { setLiveStatus("poll"); return; }

  es.addEventListener("open", () => {
    sseConnected = true;
    setLiveStatus("sse");
    clearInterval(pollTimer);
    pollTimer = setInterval(poll, 30000);   // 30s heartbeat as backup
  });

  es.addEventListener("scan", (ev) => {
    pollSoon();
  });

  es.addEventListener("data", (ev) => {
    pollSoon();
  });

  es.addEventListener("error", () => {
    if (sseConnected) {
      sseConnected = false;
      setLiveStatus("lost");
      clearInterval(pollTimer);
      pollTimer = setInterval(poll, POLL_INTERVAL);
    }
    // EventSource itself will retry; if the daemon isn't there at all,
    // we just keep polling at POLL_INTERVAL.
  });
}

// Probe /healthz: if it answers, the daemon is in front of us → SSE.
// Otherwise we're on plain GH Pages → stick with polling.
fetch("/healthz", { cache: "no-store" })
  .then(r => { if (r.ok) connectSSE(); else setLiveStatus("poll"); })
  .catch(() => setLiveStatus("poll"));
</script>
