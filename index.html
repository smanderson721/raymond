<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Raymond — Live Market Scan</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #07080b;
    --panel: #11141a;
    --panel2: #181c24;
    --border: #232833;
    --text: #e5e8ef;
    --muted: #6f7787;
    --dim: #4a5060;
    --accent: #ffd23f;
    --accent2: #ffa726;
    --green: #4ade80;
    --green-dim: #1d3a25;
    --red: #f87171;
    --red-dim: #3a1d1d;
    --blue: #60a5fa;
    --purple: #c084fc;
    --hit: #ff3366;
    --hit-glow: rgba(255, 51, 102, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    height: 100vh;
  }

  /* ── Header ────────────────────────────────────── */
  header {
    padding: 10px 18px 8px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0b0d12, var(--bg));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .brand h1 {
    font: 600 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.5px;
  }
  .brand .sub { color: var(--muted); font-size: 11px; }
  .regime {
    padding: 4px 12px;
    border-radius: 12px;
    font: 600 11px/1.4 -apple-system, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: var(--panel2);
    border: 1px solid var(--border);
  }
  .regime.risk_on, .regime.constructive { color: var(--green); border-color: var(--green-dim); }
  .regime.risk_off, .regime.defensive   { color: var(--red);   border-color: var(--red-dim); }
  .regime.neutral                       { color: var(--muted); }
  .clock { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }

  /* ── Banner (hit) ───────────────────────────────── */
  #banner {
    position: fixed;
    top: 60px; left: 50%; transform: translateX(-50%) translateY(-200%);
    z-index: 50;
    width: min(820px, 92vw);
    padding: 16px 28px;
    background: linear-gradient(135deg, #ff3366, #ff7a1a);
    color: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 40px var(--hit-glow), 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.45s cubic-bezier(.22,1.5,.4,1), opacity 0.4s;
    display: flex; align-items: center; gap: 18px;
    font: 600 16px/1.3 -apple-system, sans-serif;
  }
  #banner.show { transform: translateX(-50%) translateY(0); }
  #banner .icon { font-size: 28px; }
  #banner .ticker {
    background: rgba(0,0,0,0.25);
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 800;
    letter-spacing: 1px;
  }
  #banner .pts { font-weight: 800; }
  #banner .reason { opacity: 0.92; font-weight: 500; font-size: 14px; }
  #banner .scan { opacity: 0.6; font-size: 12px; margin-left: auto; }

  /* ── Main 2-col layout ──────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: 0;
    overflow: hidden;
  }

  /* Terminal column */
  #terminal-wrap {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .col-head {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font: 600 11px/1 -apple-system, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    display: flex; align-items: center; gap: 10px;
  }
  .col-head .count { color: var(--dim); font-weight: 400; }
  .col-head .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    font-size: 12.5px;
  }
  #terminal::-webkit-scrollbar { width: 8px; }
  #terminal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .ev {
    padding: 2px 16px;
    display: grid;
    grid-template-columns: 64px 92px 1fr;
    gap: 8px;
    align-items: baseline;
    border-left: 2px solid transparent;
  }
  .ev:hover { background: rgba(255,255,255,0.02); }
  .ev .ts { color: var(--dim); font-size: 11px; font-variant-numeric: tabular-nums; }
  .ev .scan { color: var(--muted); font-size: 11px; }
  .ev .msg { color: var(--text); white-space: pre; overflow: hidden; text-overflow: ellipsis; }
  .ev.info .msg { color: var(--text); }
  .ev.notable {
    border-left-color: var(--accent);
    background: rgba(255, 210, 63, 0.04);
  }
  .ev.notable .msg { color: var(--accent); }
  .ev.hit {
    border-left-color: var(--hit);
    background: linear-gradient(90deg, rgba(255,51,102,0.08), transparent 60%);
  }
  .ev.hit .msg { color: #ffb3c5; font-weight: 600; }

  /* Watchlist column */
  #watch-wrap {
    display: flex; flex-direction: column;
    min-height: 0;
    background: var(--panel);
  }
  #watch {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #watch::-webkit-scrollbar { width: 8px; }
  #watch::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .row {
    padding: 9px 14px;
    display: grid;
    grid-template-columns: 22px 58px 70px 1fr;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid #1a1d23;
    transition: background 0.3s;
  }
  .row.flash { background: rgba(74,222,128,0.12); }
  .row .rank {
    font: 700 11px/1 -apple-system, sans-serif;
    color: var(--dim);
    text-align: right;
  }
  .row.top1 .rank { color: var(--accent); font-size: 13px; }
  .row.top3 .rank { color: var(--accent2); }
  .row .tk {
    font: 700 14px/1 ui-monospace, monospace;
    color: var(--text);
  }
  .row.top1 .tk { color: var(--accent); text-shadow: 0 0 6px rgba(255,210,63,0.5); }
  .row .score {
    font: 700 13px/1 ui-monospace, monospace;
    color: var(--green);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .row .reason {
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Footer ─────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    background: var(--panel);
    padding: 7px 18px;
    display: flex;
    gap: 22px;
    font-size: 11px;
    color: var(--muted);
    align-items: center;
  }
  footer .item strong { color: var(--text); font-weight: 600; }
  footer .ok { color: var(--green); }
  footer .err { color: var(--red); }
  footer a { color: var(--blue); text-decoration: none; margin-left: auto; }
  footer a:hover { text-decoration: underline; }

  /* ── Scan strip (per-scan health rail) ──────────── */
  #scan-strip {
    display: grid;
    grid-template-columns: repeat(10, minmax(0, 1fr));
    gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  @media (max-width: 1280px) {
    #scan-strip { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  }
  .scan-tile {
    position: relative;
    padding: 6px 10px 7px;
    border-radius: 6px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--dim);
    display: grid;
    grid-template-rows: auto auto auto;
    gap: 2px;
    min-width: 0;
    overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
  }
  .scan-tile .name {
    font: 600 11px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.3px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scan-tile .cron {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scan-tile .meta {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    font-size: 10px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .scan-tile .meta .age { color: var(--muted); }
  .scan-tile.ok      { border-left-color: var(--green); }
  .scan-tile.stale   { border-left-color: var(--accent2); }
  .scan-tile.err     { border-left-color: var(--red); background: var(--red-dim); }
  .scan-tile.pending { border-left-color: var(--dim); opacity: 0.7; }
  .scan-tile.recent::after {
    content: "";
    position: absolute;
    top: 4px; right: 4px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 4px var(--green);
    animation: pulse 1.6s infinite;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <h1>RAYMOND</h1>
      <div class="sub">live market scan · 24/7</div>
    </div>
  </div>
  <div class="regime neutral" id="regime">REGIME · loading</div>
  <div class="clock" id="clock">—</div>
</header>

<section id="scan-strip" title="Scans wired into the live feed. Coloured bar = health."></section>

<div id="banner">
  <div class="icon">🎯</div>
  <div class="ticker" id="b-tk">—</div>
  <div class="pts" id="b-pts">+0</div>
  <div class="reason" id="b-reason">—</div>
  <div class="scan" id="b-scan">—</div>
</div>

<main>
  <section id="terminal-wrap">
    <div class="col-head">
      <span class="live-dot"></span>
      SCAN FEED
      <span class="count" id="ev-count">0 events</span>
    </div>
    <div id="terminal"></div>
  </section>
  <section id="watch-wrap">
    <div class="col-head">
      🏆 TOP 10 WATCHLIST
      <span class="count" id="wl-meta">decay 12h</span>
    </div>
    <div id="watch"></div>
  </section>
</main>

<footer>
  <div class="item"><strong id="f-scans">0</strong> scans</div>
  <div class="item"><strong id="f-hits">0</strong> hits</div>
  <div class="item">macro: <strong id="f-macro">—</strong></div>
  <div class="item">last scan: <strong id="f-last">—</strong></div>
  <div class="item">status: <span id="f-status" class="ok">live</span></div>
  <a href="https://github.com/smanderson721/raymond" target="_blank">repo</a>
  <a href="docs/data-sources.html">data sources</a>
</footer>

<script>
const POLL_INTERVAL = 6000;
const EVENT_REVEAL_RATE = 90;
const MAX_VISIBLE_EVENTS = 250;

const URLS = {
  events:    "data/live/events.json",
  watchlist: "data/live/watchlist.json",
  hits:      "data/live/hits.json",
  status:    "data/live/status.json",
  macro:     "data/live/macro_state.json",
};

let seenEventKeys = new Set();
let seenHitKeys = new Set();
let queue = [];
let prevWatchTs = new Map();
let firstLoad = true;

// ── Scan registry ───────────────────────────────────────────────────
// Cron schedules mirror .github/workflows/live-scans.yml. Update both.
// "stale_min" = minutes after which a scan is considered overdue.
const SCAN_REGISTRY = [
  { id: "macro_regime",      cron: "*/15 * * * *",         label: "every 15 min",            stale_min: 30 },
  { id: "tech_slice",        cron: "7-59/15 * * * *",      label: "every 15 min (+7)",       stale_min: 30 },
  { id: "insider_cluster",   cron: "20 */3 * * *",         label: "every 3 hr (:20)",        stale_min: 240 },
  { id: "material_8k",       cron: "5 */2 * * *",          label: "every 2 hr (:05)",        stale_min: 180 },
  { id: "sc_13dg",           cron: "35 * * * *",           label: "hourly (:35)",            stale_min: 120 },
  { id: "halt_tape",         cron: "*/2 14-20 * * 1-5",    label: "2 min, mkt hrs UTC",      stale_min: 15 },
  { id: "options_unusual",   cron: "*/30 14-20 * * 1-5",   label: "30 min, mkt hrs UTC",     stale_min: 120 },
  { id: "reg_sho",           cron: "30 12 * * *",          label: "daily 12:30 UTC",         stale_min: 1500 },
  { id: "fundamentals_snap", cron: "15 13 * * *",          label: "daily 13:15 UTC",         stale_min: 1500 },
  { id: "macro_econ",        cron: "20 13,17,22 * * *",    label: "3× daily UTC",            stale_min: 800 },
];

function renderScanStrip(runs) {
  const strip = document.getElementById("scan-strip");
  // pick the most-recent run per scan
  const latest = new Map();
  for (const r of runs || []) {
    const prev = latest.get(r.scan);
    if (!prev || r.started_at > prev.started_at) latest.set(r.scan, r);
  }
  const now = Date.now();
  strip.innerHTML = SCAN_REGISTRY.map(meta => {
    const last = latest.get(meta.id);
    let cls = "pending", age = "never", metaRight = "—";
    if (last) {
      const ts = Date.parse(last.started_at);
      const ageMin = (now - ts) / 60000;
      if (last.error) cls = "err";
      else if (ageMin > meta.stale_min) cls = "stale";
      else cls = "ok";
      age = ageMin < 1 ? "now"
          : ageMin < 60 ? `${Math.round(ageMin)}m ago`
          : ageMin < 1440 ? `${(ageMin/60).toFixed(1)}h ago`
          : `${Math.round(ageMin/1440)}d ago`;
      metaRight = `${last.events ?? 0}ev · ${last.awards ?? 0}aw`;
      if ((now - ts) < 90000) cls += " recent";
    }
    const title = last && last.error
      ? `error: ${last.error}`
      : (last && last.note) ? last.note : `no run yet · ${meta.cron}`;
    return `
      <div class="scan-tile ${cls}" title="${title.replace(/"/g,'&quot;')}">
        <div class="name">${meta.id}</div>
        <div class="cron">${meta.label}</div>
        <div class="meta"><span class="age">${age}</span><span>${metaRight}</span></div>
      </div>
    `;
  }).join("");
}

async function jget(url) {
  try {
    const r = await fetch(url + "?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

const fmtTs = iso => iso ? iso.slice(11, 19) : "—";
const lvlClass = lvl => lvl === "hit" ? "hit" : lvl === "notable" ? "notable" : "info";

function renderEvent(ev) {
  const term = document.getElementById("terminal");
  const div = document.createElement("div");
  div.className = "ev " + lvlClass(ev.level);
  div.innerHTML = `
    <span class="ts">${fmtTs(ev.ts)}</span>
    <span class="scan">${ev.scan || ""}</span>
    <span class="msg">${(ev.message || "").replace(/</g, "&lt;")}</span>
  `;
  term.appendChild(div);
  while (term.children.length > MAX_VISIBLE_EVENTS) term.removeChild(term.firstChild);
  term.scrollTop = term.scrollHeight;
}

function showBanner(hit) {
  const b = document.getElementById("banner");
  document.getElementById("b-tk").textContent = hit.ticker;
  document.getElementById("b-pts").textContent = "+" + Number(hit.points).toFixed(1);
  document.getElementById("b-reason").textContent = hit.reason || "";
  document.getElementById("b-scan").textContent = hit.scan || "";
  b.classList.remove("show");
  void b.offsetWidth;
  b.classList.add("show");
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => b.classList.remove("show"), 8000);
}

function renderWatchlist(wl) {
  const w = document.getElementById("watch");
  const newTs = new Map(wl.map(r => [r.ticker, r.last_ts]));
  w.innerHTML = wl.slice(0, 10).map(r => {
    const flashing = !firstLoad && prevWatchTs.has(r.ticker) && prevWatchTs.get(r.ticker) !== r.last_ts;
    const topClass = r.rank === 1 ? "top1" : r.rank <= 3 ? "top3" : "";
    const reason = (r.last_reason || "").replace(/</g, "&lt;");
    return `
      <div class="row ${topClass} ${flashing ? "flash" : ""}">
        <span class="rank">${r.rank}</span>
        <span class="tk">${r.ticker}</span>
        <span class="score">${Number(r.score).toFixed(1)}</span>
        <span class="reason" title="${reason}">${reason}</span>
      </div>
    `;
  }).join("");
  prevWatchTs = newTs;
  if (firstLoad) firstLoad = false;
  else setTimeout(() => {
    document.querySelectorAll(".row.flash").forEach(r => r.classList.remove("flash"));
  }, 1500);
}

function pumpQueue() {
  if (queue.length === 0) return;
  renderEvent(queue.shift());
  document.getElementById("ev-count").textContent =
    `${document.getElementById("terminal").children.length} events visible`;
  // accelerate when queue is large so we don't lag behind
  const rate = queue.length > 100 ? 20 : queue.length > 30 ? 50 : EVENT_REVEAL_RATE;
  setTimeout(pumpQueue, rate);
}

async function poll() {
  const [events, watchlist, hits, status, macro] = await Promise.all([
    jget(URLS.events), jget(URLS.watchlist), jget(URLS.hits),
    jget(URLS.status), jget(URLS.macro),
  ]);

  if (events && Array.isArray(events.events)) {
    const fresh = events.events.filter(e => {
      const k = e.ts + "|" + (e.message || "");
      if (seenEventKeys.has(k)) return false;
      seenEventKeys.add(k);
      return true;
    });
    if (fresh.length > 0) {
      const wasIdle = queue.length === 0;
      queue.push(...fresh);
      if (wasIdle) pumpQueue();
    }
    // bound the seen set
    if (seenEventKeys.size > 5000) seenEventKeys = new Set(Array.from(seenEventKeys).slice(-2500));
  }

  if (watchlist && Array.isArray(watchlist.watchlist)) {
    renderWatchlist(watchlist.watchlist);
  }

  if (hits && Array.isArray(hits.hits)) {
    const fresh = hits.hits.filter(h => {
      const k = h.ts + "|" + h.ticker;
      if (seenHitKeys.has(k)) return false;
      seenHitKeys.add(k);
      return true;
    });
    if (fresh.length > 0 && !document.hidden) {
      showBanner(fresh[fresh.length - 1]);
    }
    document.getElementById("f-hits").textContent = hits.hits.length;
  }

  if (macro && macro.regime) {
    const r = document.getElementById("regime");
    r.textContent = `REGIME · ${macro.regime.toUpperCase()} · ×${macro.multiplier}`;
    r.className = "regime " + macro.regime;
    document.getElementById("f-macro").textContent =
      `${macro.regime} (VIX ${macro.vix_level ?? "—"})`;
  }

  if (status && Array.isArray(status.runs)) {
    const runs = status.runs;
    renderScanStrip(runs);
    document.getElementById("f-scans").textContent = runs.length;
    const last = runs[runs.length - 1];
    if (last) {
      document.getElementById("f-last").textContent =
        `${last.scan} (${fmtTs(last.started_at)} · ${last.duration_sec}s · ${last.events}ev/${last.awards}aw)`;
    }
    const errs = runs.filter(r => r.error).length;
    const f = document.getElementById("f-status");
    if (errs > 0) { f.textContent = `${errs} recent errors`; f.className = "err"; }
    else { f.textContent = "live"; f.className = "ok"; }
  }
}

function tick() {
  const d = new Date();
  document.getElementById("clock").textContent =
    String(d.getUTCHours()).padStart(2,"0") + ":" +
    String(d.getUTCMinutes()).padStart(2,"0") + ":" +
    String(d.getUTCSeconds()).padStart(2,"0") + " UTC";
}
setInterval(tick, 1000);
tick();

renderScanStrip([]);  // show pending tiles before first poll
poll();

// ── Live updates via SSE (live_daemon) with poll fallback ────────────
//
// When the dashboard is served by raymond/live_daemon.py on alice, the
// daemon exposes /api/stream as an EventSource. Each `scan` or `data`
// event triggers an immediate poll() so the UI updates the moment a
// scan completes — no more 6s polling latency.
//
// If SSE isn't available (e.g. served from GitHub Pages still), we
// fall back to the original 6s polling cadence.

let sseConnected = false;
let pollTimer = setInterval(poll, POLL_INTERVAL);
let pollSoonTimer = null;

function pollSoon() {
  // debounce: many `data` events may arrive in quick succession when
  // a scan finishes and rewrites multiple JSON files.
  if (pollSoonTimer) return;
  pollSoonTimer = setTimeout(() => {
    pollSoonTimer = null;
    poll();
  }, 150);
}

function setLiveStatus(mode) {
  const f = document.getElementById("f-status");
  if (mode === "sse") { f.textContent = "live ⚡"; f.className = "ok"; }
  else if (mode === "poll") { f.textContent = "polling"; f.className = "ok"; }
  else if (mode === "lost") { f.textContent = "reconnecting…"; f.className = "stale"; }
}

function connectSSE() {
  // EventSource auto-reconnects, but we wrap it so we can switch the
  // background poll cadence between "fast safety net" (no SSE) and
  // "slow heartbeat" (SSE alive).
  let es;
  try { es = new EventSource("/api/stream"); }
  catch { setLiveStatus("poll"); return; }

  es.addEventListener("open", () => {
    sseConnected = true;
    setLiveStatus("sse");
    clearInterval(pollTimer);
    pollTimer = setInterval(poll, 30000);   // 30s heartbeat as backup
  });

  es.addEventListener("scan", (ev) => {
    pollSoon();
  });

  es.addEventListener("data", (ev) => {
    pollSoon();
  });

  es.addEventListener("error", () => {
    if (sseConnected) {
      sseConnected = false;
      setLiveStatus("lost");
      clearInterval(pollTimer);
      pollTimer = setInterval(poll, POLL_INTERVAL);
    }
    // EventSource itself will retry; if the daemon isn't there at all,
    // we just keep polling at POLL_INTERVAL.
  });
}

// Probe /healthz: if it answers, the daemon is in front of us → SSE.
// Otherwise we're on plain GH Pages → stick with polling.
fetch("/healthz", { cache: "no-store" })
  .then(r => { if (r.ok) connectSSE(); else setLiveStatus("poll"); })
  .catch(() => setLiveStatus("poll"));
</script>
