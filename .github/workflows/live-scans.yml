name: Live Scans

# Continuous market scans. Each scan writes events + scores into
# data/live/*.json and commits them back to main so the GitHub Pages
# dashboard can poll for updates.
#
# Cron schedules (UTC):
#   macro_regime    — every 15 min                  (T1: 15min env scan)
#   tech_slice      — every 15 min, offset +7        (T1: rolling 400 tickers)
#   reg_sho         — daily 12:30 UTC                 (T3: after FINRA T+1 publish)
#   insider_cluster — every 3 hours, :20              (T2: EDGAR index updates intraday)
#
# All jobs share a single concurrency group so commits serialise.

on:
  schedule:
    - cron: "*/15 * * * *"        # macro_regime — top of every 15 min
    - cron: "7-59/15 * * * *"     # tech_slice  — offset by 7 min
    - cron: "30 12 * * *"         # reg_sho     — daily 12:30 UTC (08:30 ET)
    - cron: "20 */3 * * *"        # insider_cluster — every 3 hours, :20
  workflow_dispatch:
    inputs:
      scan:
        description: "Scan to run"
        required: true
        default: "macro_regime"
        type: choice
        options:
          - macro_regime
          - tech_slice
          - reg_sho
          - insider_cluster

permissions:
  contents: write

concurrency:
  group: live-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pick scan from cron schedule
        id: pick
        run: |
          if [[ -n "${{ github.event.inputs.scan }}" ]]; then
            echo "scan=${{ github.event.inputs.scan }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "*/15 * * * *")     echo "scan=macro_regime"    >> "$GITHUB_OUTPUT" ;;
              "7-59/15 * * * *")  echo "scan=tech_slice"      >> "$GITHUB_OUTPUT" ;;
              "30 12 * * *")      echo "scan=reg_sho"         >> "$GITHUB_OUTPUT" ;;
              "20 */3 * * *")     echo "scan=insider_cluster" >> "$GITHUB_OUTPUT" ;;
              *)                  echo "scan=macro_regime"    >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Run scan
        run: python scan_runner.py "${{ steps.pick.outputs.scan }}"

      - name: Commit live data
        run: |
          git config user.name  "raymond-bot"
          git config user.email "raymond-bot@users.noreply.github.com"
          git add data/live/*.json
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          # rebase-and-push handles concurrent runs
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then exit 0; fi
            sleep 5
          done
          exit 1
