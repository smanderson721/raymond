name: Live Scans

# Continuous market scans. Each scan writes events + scores into
# data/live/*.json and commits them back to main so the GitHub Pages
# dashboard can poll for updates.
#
# Cron schedules (UTC):
#   macro_regime      — every 15 min                       (T1: env scan)
#   tech_slice        — every 15 min, offset +7              (T1: rolling 400 tickers)
#   reg_sho           — daily 12:30 UTC                       (T3: post FINRA T+1)
#   insider_cluster   — every 3 hours, :20                    (T2: EDGAR intraday)
#   options_unusual   — every 30 min during US market hours   (T1: top watchlist)
#   material_8k       — every 2 hours, :05                    (T2: EDGAR 8-Ks)
#   fundamentals_snap — daily 13:15 UTC (09:15 ET)            (T3: Finnhub float/SI)
#   macro_econ        — 3× daily (13:20 / 17:20 / 22:20 UTC) (T2: FRED releases)
#
# All jobs share a single concurrency group so commits serialise.

on:
  # ── Cron schedules DISABLED 2026-05-28 ────────────────────────────
  # All live scans now run inside live_daemon.py on the Oracle alice
  # instance (always-on, schedules + SSE built in). See the README /
  # systemd unit on alice. Re-enable these crons only if alice goes
  # down and you need GHA as a temporary fallback. Manual dispatch
  # below still works for ad-hoc runs.
  # schedule:
  #   - cron: "*/15 * * * *"            # macro_regime
  #   - cron: "7-59/15 * * * *"         # tech_slice
  #   - cron: "30 12 * * *"             # reg_sho
  #   - cron: "20 */3 * * *"            # insider_cluster
  #   - cron: "*/30 14-20 * * 1-5"      # options_unusual (US market hours, weekdays)
  #   - cron: "5 */2 * * *"             # material_8k
  #   - cron: "15 13 * * *"             # fundamentals_snap
  #   - cron: "20 13,17,22 * * *"       # macro_econ
  workflow_dispatch:
    inputs:
      scan:
        description: "Scan to run"
        required: true
        default: "macro_regime"
        type: choice
        options:
          - macro_regime
          - tech_slice
          - reg_sho
          - insider_cluster
          - options_unusual
          - material_8k
          - fundamentals_snap
          - macro_econ

permissions:
  contents: write

concurrency:
  group: live-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pick scan from cron schedule
        id: pick
        run: |
          if [[ -n "${{ github.event.inputs.scan }}" ]]; then
            echo "scan=${{ github.event.inputs.scan }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "*/15 * * * *")        echo "scan=macro_regime"      >> "$GITHUB_OUTPUT" ;;
              "7-59/15 * * * *")     echo "scan=tech_slice"        >> "$GITHUB_OUTPUT" ;;
              "30 12 * * *")         echo "scan=reg_sho"           >> "$GITHUB_OUTPUT" ;;
              "20 */3 * * *")        echo "scan=insider_cluster"   >> "$GITHUB_OUTPUT" ;;
              "*/30 14-20 * * 1-5")  echo "scan=options_unusual"   >> "$GITHUB_OUTPUT" ;;
              "5 */2 * * *")         echo "scan=material_8k"       >> "$GITHUB_OUTPUT" ;;
              "15 13 * * *")         echo "scan=fundamentals_snap" >> "$GITHUB_OUTPUT" ;;
              "20 13,17,22 * * *")   echo "scan=macro_econ"        >> "$GITHUB_OUTPUT" ;;
              *)                     echo "scan=macro_regime"      >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Run scan + commit (retry-on-race)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: |
          git config user.name  "raymond-bot"
          git config user.email "raymond-bot@users.noreply.github.com"
          SCAN="${{ steps.pick.outputs.scan }}"
          for i in 1 2 3 4; do
            echo "::group::attempt $i for $SCAN"
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            python scan_runner.py "$SCAN"
            git add data/live/*.json
            if git diff --staged --quiet; then
              echo "no changes — done"
              echo "::endgroup::"
              exit 0
            fi
            git commit -m "[live-scan] $SCAN $(date -u +%FT%TZ)" --quiet
            if git push origin main 2>&1 | tee /tmp/push.log; then
              echo "::endgroup::"
              exit 0
            fi
            echo "push race — will re-run scan against latest origin/main"
            echo "::endgroup::"
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::gave up after 4 attempts"
          exit 1
